name: Release

on:
  push:
    tags:
    - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: "24"

    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.14

    - name: Assert Node.js version
      run: node -e "const v=+process.version.slice(1).split('.')[0]; if(v<22)process.exit(1)"

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: CI gates
      run: bun run ci

    - name: Verify git tag, package version, and CHANGELOG
      run: |
        set -euo pipefail
        TAG="${GITHUB_REF#refs/tags/v}"
        PKG=$(node -p "require('./package.json').version")
        if [ "$TAG" != "$PKG" ]; then
          echo "::error::Git tag v$TAG must match package.json version $PKG (publish aborted)."
          exit 1
        fi
        node -e "const fs=require('fs');const v='${PKG}';const c=fs.readFileSync('CHANGELOG.md','utf8');if(!c.includes('## ['+v+']')){console.error('CHANGELOG.md is missing a ## ['+v+'] entry.');process.exit(1)}"

    - name: Create tarball for GitHub Release
      id: pack
      run: |
        set -euo pipefail
        npm pack --ignore-scripts
        tarball=$(find . -maxdepth 1 -name 'rethunk-mcp-multi-root-git-*.tgz' -printf '%T@ %p\n' | sort -rn | head -1 | cut -d' ' -f2-)
        echo "tarball=${tarball#./}" >> "$GITHUB_OUTPUT"

    - name: Publish to GitHub Packages (npm registry)
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        node <<'NODE'
        const fs = require("node:fs");
        const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
        p.name = "@rethunk-ai/mcp-multi-root-git";
        p.publishConfig = {
          registry: "https://npm.pkg.github.com",
          access: "public",
        };
        fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
        NODE
        {
          echo "@rethunk-ai:registry=https://npm.pkg.github.com"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
        } > .npmrc
        npm publish --ignore-scripts --access public

    - name: Create GitHub Release (official gh CLI, no third-party action)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        gh release create "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.tarball }}" \
          --verify-tag \
          --generate-notes
