name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint and format check
        run: bun run check

      - name: Unit tests
        run: bun run test

  prerelease-pack:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Pack npm tarball (prerelease snapshot)
        id: pack
        run: |
          set -euo pipefail
          npm pack
          SRC=$(ls -t rethunk-mcp-multi-root-git-*.tgz | head -1)
          DEST="rethunk-mcp-multi-root-git-prerelease-${{ github.sha }}.tgz"
          mv "$SRC" "$DEST"
          echo "tarball=$DEST" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-pack-prerelease-${{ github.sha }}
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 90
