name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Bun ${{ matrix.bun }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun: ["1.3.11", "latest"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - name: Smoke (Node can parse published entry)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --check dist/server.js
